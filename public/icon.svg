<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e"/>
      <stop offset="100%" style="stop-color:#0a0e14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffb347"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Chess board pattern (subtle) -->
  <g opacity="0.15">
    <rect x="96" y="96" width="80" height="80" fill="#fff"/>
    <rect x="176" y="176" width="80" height="80" fill="#fff"/>
    <rect x="256" y="96" width="80" height="80" fill="#fff"/>
    <rect x="336" y="176" width="80" height="80" fill="#fff"/>
    <rect x="96" y="256" width="80" height="80" fill="#fff"/>
    <rect x="176" y="336" width="80" height="80" fill="#fff"/>
    <rect x="256" y="256" width="80" height="80" fill="#fff"/>
    <rect x="336" y="336" width="80" height="80" fill="#fff"/>
  </g>
  <!-- King piece (stylized vault/crown) -->
  <g transform="translate(256, 256)">
    <!-- Crown/King -->
    <path d="M0 -100 L0 -130" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>
    <path d="M-20 -115 L20 -115" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>
    <!-- Main body -->
    <path d="M-70 80 C-70 80 -90 20 -70 -20 C-50 -60 -30 -70 0 -70 C30 -70 50 -60 70 -20 C90 20 70 80 70 80 Z" 
          fill="url(#gold)" stroke="#b8860b" stroke-width="3"/>
    <!-- Crown details -->
    <path d="M-70 80 L70 80 L70 100 L-70 100 Z" fill="url(#gold)" stroke="#b8860b" stroke-width="2"/>
    <path d="M-60 100 L60 100 L55 120 L-55 120 Z" fill="url(#gold)" stroke="#b8860b" stroke-width="2"/>
    <!-- Face details (vault keyhole) -->
    <circle cx="0" cy="10" r="18" fill="#1a1f2e"/>
    <rect x="-6" y="10" width="12" height="30" fill="#1a1f2e"/>
  </g>
  <!-- Glow effect -->
  <circle cx="256" cy="256" r="90" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>
</svg>
