<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1209"/>
      <stop offset="100%" style="stop-color:#0c0a05"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe566"/>
      <stop offset="40%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#c97b00"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#fff6cc;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle chess grid in background -->
  <g opacity="0.07" fill="#f5a623">
    <rect x="56"  y="56"  width="50" height="50"/>
    <rect x="156" y="56"  width="50" height="50"/>
    <rect x="256" y="56"  width="50" height="50"/>
    <rect x="356" y="56"  width="50" height="50"/>
    <rect x="106" y="106" width="50" height="50"/>
    <rect x="206" y="106" width="50" height="50"/>
    <rect x="306" y="106" width="50" height="50"/>
    <rect x="406" y="106" width="50" height="50"/>
    <rect x="56"  y="406" width="50" height="50"/>
    <rect x="156" y="406" width="50" height="50"/>
    <rect x="256" y="406" width="50" height="50"/>
    <rect x="356" y="406" width="50" height="50"/>
    <rect x="106" y="356" width="50" height="50"/>
    <rect x="206" y="356" width="50" height="50"/>
    <rect x="306" y="356" width="50" height="50"/>
    <rect x="406" y="356" width="50" height="50"/>
  </g>

  <!-- Ambient glow behind king -->
  <ellipse cx="256" cy="280" rx="120" ry="100" fill="#f5a623" opacity="0.08" filter="url(#glow)"/>

  <!-- King piece — classic chess king shape -->
  <g transform="translate(256,265)" filter="url(#softglow)">
    <!-- Cross top -->
    <rect x="-10" y="-170" width="20" height="70" rx="6" fill="url(#gold)"/>
    <rect x="-35" y="-155" width="70" height="20" rx="6" fill="url(#gold)"/>

    <!-- Crown head -->
    <path d="M-48,-100 L-62,-58 L-20,-72 L0,-110 L20,-72 L62,-58 L48,-100 Z"
          fill="url(#gold)" stroke="#c97b00" stroke-width="3" stroke-linejoin="round"/>

    <!-- Crown collar -->
    <rect x="-52" y="-68" width="104" height="16" rx="4" fill="url(#gold)"/>

    <!-- Body -->
    <path d="M-52,-52 C-62,-10 -68,40 -64,90 L64,90 C68,40 62,-10 52,-52 Z"
          fill="url(#gold)" stroke="#c97b00" stroke-width="2"/>

    <!-- Shine overlay on body -->
    <path d="M-52,-52 C-62,-10 -68,40 -64,90 L64,90 C68,40 62,-10 52,-52 Z"
          fill="url(#goldShine)"/>

    <!-- Base -->
    <rect x="-70" y="90" width="140" height="22" rx="6" fill="url(#gold)" stroke="#c97b00" stroke-width="2"/>
    <rect x="-80" y="112" width="160" height="22" rx="6" fill="url(#gold)" stroke="#c97b00" stroke-width="2"/>
  </g>

  <!-- Outer ring -->
  <rect x="18" y="18" width="476" height="476" rx="100" fill="none" stroke="#f5a623" stroke-width="6" opacity="0.18"/>
</svg>

